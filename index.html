<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel draw</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>Pixel draw</h1>
            
            <label for="rows">height</label>
            <input type="number" id="rows" value="20" min="5" max="100">
            
            <label for="cols">columns</label>
            <input type="number" id="cols" value="20" min="5" max="100">
            
            <label for="size">graph size</label>
            <input type="number" id="size" value="25" min="10" max="50" step="5">
            
            <label for="colorPicker">choose color</label>
            <input type="color" id="cp" value="#3b82f6">
            
            <button id="clear">clear</button>
        <div class="canvas-container">
            <canvas id="gridCanvas"></canvas>
        </div>
        
    </div>
    <script>"script.js"</script>
</body>
</html>
